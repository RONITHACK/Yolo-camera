<!DOCTYPE html>
<html>
<head>
  <title>YOLOv8 Live Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; }
    h3 { margin: 12px 0 6px; }
    #container { position: relative; display: inline-block; width: 100%; }
    video { width: 100%; display: block; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #status { padding: 8px; font-size: 13px; color: #0f0; min-height: 24px; }
    input {
      width: 90%; padding: 8px 10px; margin: 6px auto;
      font-size: 12px; border-radius: 6px; border: 1px solid #444;
      background: #222; color: white; display: block;
    }
    button {
      padding: 10px 28px; background: #0af; border: none;
      color: white; border-radius: 8px; font-size: 15px;
      cursor: pointer; margin-bottom: 8px;
    }
    button:active { background: #088; }
  </style>
</head>
<body>
  <h3>📷 YOLOv8 Live Detection</h3>
  <input id="serverUrl" placeholder="Paste ngrok URL (e.g. https://xxxx.ngrok-free.app)" />
  <button onclick="startCamera()">Start Camera</button>
  <div id="status">Waiting to start...</div>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

<script>
  const video   = document.getElementById('video');
  const canvas  = document.getElementById('overlay');
  const ctx     = canvas.getContext('2d');
  const status  = document.getElementById('status');
  let running   = false;

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        running = true;
        status.textContent = '🎥 Camera started — connecting...';
        detectLoop();
      };
    } catch (e) {
      status.textContent = '❌ Camera access denied: ' + e.message;
    }
  }

  async function detectLoop() {
    if (!running) return;

    // Capture current video frame
    const tmp = document.createElement('canvas');
    tmp.width  = video.videoWidth;
    tmp.height = video.videoHeight;
    tmp.getContext('2d').drawImage(video, 0, 0);
    const base64 = tmp.toDataURL('image/jpeg', 0.7);

    const serverUrl = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
    if (!serverUrl) {
      status.textContent = '⚠️ Please paste the ngrok URL first';
      setTimeout(detectLoop, 1000);
      return;
    }

    try {
      const res = await fetch(`${serverUrl}/detect`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64 })
      });
      const data = await res.json();

      // Clear and redraw bounding boxes
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      data.detections.forEach(d => {
        const [x1, y1, x2, y2] = d.bbox;
        const label = `${d.label} ${Math.round(d.confidence * 100)}%`;

        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth   = 2;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        ctx.fillStyle = 'rgba(0,255,136,0.85)';
        ctx.fillRect(x1, y1 - 20, ctx.measureText(label).width + 10, 20);

        ctx.fillStyle = '#000';
        ctx.font      = 'bold 13px sans-serif';
        ctx.fillText(label, x1 + 5, y1 - 5);
      });

      status.textContent = data.detections.length
        ? `✅ ${data.detections.length} object(s): ${data.detections.map(d => d.label).join(', ')}`
        : '🔍 No objects detected';

    } catch (e) {
      status.textContent = '❌ Cannot reach server — check the URL';
    }

    setTimeout(detectLoop, 600); // ~1.6 FPS — lower = faster but more load
  }
</script>
</body>
</html>
